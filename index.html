<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIAP108</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:380px;
    max-width:95%;
    text-align:center;
}

.logo{
    color:#FFD700;
    font-size:52px;
    font-weight:bold;
    margin-bottom:20px;
    text-shadow:0 0 15px #ffcc00;
}

.banner img{
    width:100%;
    border-radius:12px;
    box-shadow:0 0 20px #ffcc00;
}

.btn{
    display:block;
    margin-top:18px;
    padding:18px;
    text-decoration:none;
    font-size:28px;
    font-weight:bold;
    color:#000;
    border-radius:12px;
    background:linear-gradient(#fff700,#ffc107);
    box-shadow:0 0 20px #00ff00;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.03);
}

.footer{
    margin-top:20px;
    color:white;
    font-size:13px;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
SIAP108
</div>

<div class="banner">
<img src="banner.jpg" alt="Banner">
</div>

<a href="https://LINK-LOGIN-ANDA.COM" class="btn">
LOGIN
</a>

<a href="https://LINK-DAFTAR-ANDA.COM" class="btn">
DAFTAR
</a>

<div class="footer">
© 2026 SIAP108
</div>

</div>

</body>
</html>
